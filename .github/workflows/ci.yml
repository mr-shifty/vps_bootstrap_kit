name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n bootstrap-server.sh

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck -x bootstrap-server.sh
